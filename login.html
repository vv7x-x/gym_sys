<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — GYMOS</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%233b82f6'/%3E%3Ctext x='16' y='22' text-anchor='middle' fill='white' font-size='18' font-weight='bold'%3EG%3C/text%3E%3C/svg%3E">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="login-page">
  <div class="login-bg-shapes">
    <div class="login-shape login-shape-1"></div>
    <div class="login-shape login-shape-2"></div>
  </div>

  <div class="login-card">
    <div class="login-logo">
      <div class="login-logo-icon"><i class="bi bi-dumbbell"></i></div>
      <h1>GYMOS</h1>
      <p>Sign in to manage your gym</p>
    </div>

    <div class="login-error" id="loginError"></div>

    <form id="loginForm">
      <div class="form-group">
        <label for="email"><i class="bi bi-envelope"></i> Email</label>
        <input type="email" id="email" class="form-control" placeholder="you@example.com" required autocomplete="email" autofocus>
      </div>
      <div class="form-group">
        <label for="password"><i class="bi bi-lock"></i> Password</label>
        <input type="password" id="password" class="form-control" placeholder="Enter your password" required autocomplete="current-password">
      </div>
      <button type="submit" class="btn btn-primary btn-full btn-lg" id="loginBtn">
        <i class="bi bi-box-arrow-in-right"></i> Sign In
      </button>
    </form>

    <p class="login-footer-text">Powered by Supabase</p>

    <div class="login-actions">
      <button class="btn btn-ghost btn-icon lang-toggle-btn" title="Toggle language">
        <i class="bi bi-translate"></i>
      </button>
      <button class="btn btn-ghost btn-icon theme-toggle-btn" title="Toggle theme">
        <i class="bi bi-moon theme-toggle-icon"></i>
      </button>
      <a href="index.html" class="btn btn-ghost btn-icon" title="Home">
        <i class="bi bi-house"></i>
      </a>
    </div>
  </div>

  <script type="module">
    import { SUPABASE_URL, SUPABASE_ANON_KEY } from './js/config.js';
    import { applyLang, t, getLang, setLang } from './js/i18n.js';

    if (SUPABASE_URL === 'YOUR_SUPABASE_URL') {
      document.body.innerHTML = `
        <div style="display:flex;align-items:center;justify-content:center;min-height:100vh;background:#030712;padding:40px;text-align:center;color:#f1f5f9;">
          <div>
            <h1 style="color:#3b82f6;margin-bottom:12px;">Setup Required</h1>
            <p style="color:#94a3b8;max-width:400px;">
              Please configure your Supabase credentials in <code style="background:#1e293b;padding:2px 6px;border-radius:4px;">js/config.js</code>
            </p>
          </div>
        </div>`;
    } else {
      const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

      const prefs = JSON.parse(localStorage.getItem('gymos_prefs') || '{}');
      if (prefs.theme) document.documentElement.setAttribute('data-theme', prefs.theme);
      applyLang();

      const { data: { session } } = await supabase.auth.getSession();
      if (session) window.location.href = 'dashboard.html';

      document.querySelector('.theme-toggle-btn')?.addEventListener('click', () => {
        const current = document.documentElement.getAttribute('data-theme');
        const next = current === 'dark' ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', next);
        const prefs2 = JSON.parse(localStorage.getItem('gymos_prefs') || '{}');
        prefs2.theme = next;
        localStorage.setItem('gymos_prefs', JSON.stringify(prefs2));
        document.querySelector('.theme-toggle-icon').className = `bi ${next === 'dark' ? 'bi-sun' : 'bi-moon'} theme-toggle-icon`;
      });

      document.querySelectorAll('.lang-toggle-btn')?.forEach(btn => {
        btn.addEventListener('click', () => {
          const newLang = getLang() === 'ar' ? 'en' : 'ar';
          setLang(newLang);
          window.location.reload();
        });
      });

      document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const btn = document.getElementById('loginBtn');
        const errorEl = document.getElementById('loginError');

        btn.disabled = true;
        btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> Signing in...';
        errorEl.style.display = 'none';

        const { data, error } = await supabase.auth.signInWithPassword({ email, password });

        if (error) {
          errorEl.textContent = error.message;
          errorEl.style.display = 'block';
          btn.disabled = false;
          btn.innerHTML = '<i class="bi bi-box-arrow-in-right"></i> Sign In';
          return;
        }

        window.location.href = 'dashboard.html';
      });
    }
  </script>
</body>
</html>
