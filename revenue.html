<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Revenue — GYMOS</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
</head>
<body>
  <div id="toastContainer" class="toast-container"></div>
  <div class="sidebar-overlay"></div>
  <div class="app-layout">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header"><i class="bi bi-dumbbell"></i> GYMOS</div>
      <nav class="sidebar-nav" id="sidebarNav"></nav>
      <div class="sidebar-footer" id="sidebarFooter"></div>
    </aside>
    <main class="main-content">
      <header class="topbar">
        <div class="topbar-left">
          <button class="mobile-toggle" id="mobileToggle"><i class="bi bi-list"></i></button>
          <h2>Revenue</h2>
        </div>
        <div class="topbar-right"></div>
      </header>
      <div class="page-content">
        <div class="page-header">
          <h1>Revenue</h1>
          <p>Track your gym's financial performance</p>
        </div>

        <div class="stats-grid" id="revenueCards"></div>

        <div class="dash-grid">
          <div class="dash-card">
            <h3><i class="bi bi-graph-up"></i> Revenue Over Time</h3>
            <div class="chart-container chart-container-lg">
              <canvas id="revenueChart"></canvas>
            </div>
          </div>
          <div class="dash-card">
            <h3><i class="bi bi-pie-chart"></i> Revenue by Plan</h3>
            <div class="chart-container chart-container-sm">
              <canvas id="planRevenueChart"></canvas>
            </div>
          </div>
        </div>

        <div class="dash-card" style="margin-top:20px">
          <h3><i class="bi bi-clock-history"></i> Recent Transactions</h3>
          <div id="recentTransactions"><p class="text-muted">Loading...</p></div>
        </div>
      </div>
    </main>
  </div>

  <script type="module">
    import { supabase } from './js/supabase.js';
    import { requireAuth } from './js/auth.js';
    import { renderSidebar, initTopbar, pageTransition } from './js/ui.js';
    import { formatDate, formatCurrency, showToast } from './js/utils.js';

    (async () => {
      const user = await requireAuth();
      renderSidebar('revenue');
      initTopbar('Revenue');
      pageTransition();

      const { data: payments, error: pErr } = await supabase.from('payments').select('*, members:member_id(full_name)').order('paid_at', { ascending: false });
      if (pErr) { showToast('Error loading revenue data', 'error'); return; }

    const paymentList = payments || [];

    const now = new Date();
    const todayStr = now.toISOString().split('T')[0];
    const weekStart = new Date(now); weekStart.setDate(now.getDate() - now.getDay());
    const weekStr = weekStart.toISOString().split('T')[0];
    const monthStart = new Date(now.getFullYear(), now.getMonth(), 1);
    const monthStr = monthStart.toISOString().split('T')[0];
    const yearStart = new Date(now.getFullYear(), 0, 1);
    const yearStr = yearStart.toISOString().split('T')[0];

    const todayRev = paymentList.filter(p => p.paid_at === todayStr).reduce((s, p) => s + Number(p.amount), 0);
    const weekRev = paymentList.filter(p => p.paid_at >= weekStr).reduce((s, p) => s + Number(p.amount), 0);
    const monthRev = paymentList.filter(p => p.paid_at >= monthStr).reduce((s, p) => s + Number(p.amount), 0);
    const yearRev = paymentList.filter(p => p.paid_at >= yearStr).reduce((s, p) => s + Number(p.amount), 0);
    const totalRev = paymentList.reduce((s, p) => s + Number(p.amount), 0);

    document.getElementById('revenueCards').innerHTML = `
      <div class="stat-card blue">
        <div class="stat-icon blue"><i class="bi bi-today"></i></div>
        <div class="stat-info">
          <div class="stat-number">${formatCurrency(todayRev)}</div>
          <div class="stat-label">Today's Revenue</div>
        </div>
      </div>
      <div class="stat-card green">
        <div class="stat-icon green"><i class="bi bi-calendar-week"></i></div>
        <div class="stat-info">
          <div class="stat-number">${formatCurrency(weekRev)}</div>
          <div class="stat-label">This Week</div>
        </div>
      </div>
      <div class="stat-card yellow">
        <div class="stat-icon yellow"><i class="bi bi-calendar-month"></i></div>
        <div class="stat-info">
          <div class="stat-number">${formatCurrency(monthRev)}</div>
          <div class="stat-label">This Month</div>
        </div>
      </div>
      <div class="stat-card purple">
        <div class="stat-icon purple"><i class="bi bi-calendar-year"></i></div>
        <div class="stat-info">
          <div class="stat-number">${formatCurrency(yearRev)}</div>
          <div class="stat-label">This Year</div>
        </div>
      </div>
      <div class="stat-card red">
        <div class="stat-icon red"><i class="bi bi-cash-stack"></i></div>
        <div class="stat-info">
          <div class="stat-number">${formatCurrency(totalRev)}</div>
          <div class="stat-label">Total Revenue</div>
        </div>
      </div>
    `;

    if (window.Chart) {
      const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
      const revenueByMonth = Array(12).fill(0);
      paymentList.forEach(p => {
        const d = new Date(p.paid_at);
        revenueByMonth[d.getMonth()] += Number(p.amount);
      });

      new Chart(document.getElementById('revenueChart'), {
        type: 'bar',
        data: {
          labels: months,
          datasets: [{
            label: 'Revenue',
            data: revenueByMonth,
            backgroundColor: 'rgba(59,130,246,0.6)',
            borderColor: '#3b82f6',
            borderWidth: 1,
            borderRadius: 6
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: { legend: { display: false } },
          scales: {
            y: { beginAtZero: true, grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#64748b', font: { size: 11 } } },
            x: { grid: { display: false }, ticks: { color: '#64748b', font: { size: 11 } } }
          }
        }
      });

      const { data: plans } = await supabase.from('plans').select('name');
      const planRevenue = {};
      paymentList.forEach(p => {
        const planName = p.payment_type || 'Other';
        planRevenue[planName] = (planRevenue[planName] || 0) + Number(p.amount);
      });

      new Chart(document.getElementById('planRevenueChart'), {
        type: 'doughnut',
        data: {
          labels: Object.keys(planRevenue),
          datasets: [{
            data: Object.values(planRevenue),
            backgroundColor: ['#3b82f6', '#10b981', '#f59e0b', '#8b5cf6', '#ef4444'],
            borderWidth: 0
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: { position: 'bottom', labels: { color: '#94a3b8', padding: 12, font: { size: 10 } } }
          }
        }
      });
    }

    const txnContainer = document.getElementById('recentTransactions');
    if (paymentList.length === 0) {
      txnContainer.innerHTML = '<p class="text-muted">No transactions yet</p>';
    } else {
      txnContainer.innerHTML = `
        <div class="table-container" style="border:none;box-shadow:none">
          <div class="table-wrapper">
            <table class="table">
              <thead><tr><th>Date</th><th>Member</th><th>Amount</th><th>Type</th><th>Method</th></tr></thead>
              <tbody>
                ${paymentList.slice(0, 20).map(p => `
                  <tr>
                    <td>${formatDate(p.paid_at)}</td>
                    <td>${p.members?.full_name || 'Unknown'}</td>
                    <td style="font-weight:600;color:var(--success)">${formatCurrency(p.amount)}</td>
                    <td>${p.payment_type}</td>
                    <td>${p.payment_method || '-'}</td>
                  </tr>`).join('')}
              </tbody>
            </table>
          </div>
        </div>
        ${paymentList.length > 20 ? `<p class="text-muted text-sm text-center mt-4">Showing 20 of ${paymentList.length} transactions</p>` : ''}`;
    }
    })();
  </script>
</body>
</html>
